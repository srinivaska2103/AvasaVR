<!DOCTYPE html>
<html lang="en" class="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avasa VR | Initialize Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }

        // Persistent Preference Check
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
        if (localStorage.getItem('direction') === 'rtl') {
            document.documentElement.setAttribute('dir', 'rtl');
        }
    </script>
    <style>
        .gradient-text { @apply bg-clip-text text-transparent bg-gradient-to-r from-emerald-500 to-cyan-500; }
        .glass { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl; }
        input:focus { @apply ring-2 ring-emerald-500/20; }
        .animate-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 group">
                <div class="relative bg-slate-900 rounded-lg p-2 border border-white/10">
                    <i class="fas fa-vr-cardboard text-2xl text-emerald-500"></i>
                </div>
                <div class="text-2xl font-black tracking-tighter italic uppercase dark:text-white">
                    <span class="text-emerald-500">AVASA</span> VR
                </div>
            </a>
            
            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="p-3 rounded-xl bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-white/10 transition-all hover:border-emerald-500/50">
                    <i id="theme-icon" class="fas fa-moon dark:hidden text-slate-600"></i>
                    <i id="theme-icon-dark" class="fas fa-sun hidden dark:block text-emerald-400"></i>
                </button>
                
                <button onclick="toggleDirection()" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-white/10 text-[10px] font-black uppercase tracking-widest dark:text-white transition-all hover:border-emerald-500/50">
                    <span class="rtl:hidden">RTL</span>
                    <span class="hidden rtl:inline">LTR</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 pt-28 pb-12">
        <div class="w-full max-w-[1024px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl border border-slate-200 dark:border-white/5 animate-up">
            
            <div class="hidden lg:block relative bg-slate-950">
                <img src="assets/E-sports" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent"></div>
                <div class="absolute bottom-12 left-12 right-12 ltr:text-left rtl:text-right">
                    <div class="inline-flex items-center space-x-2 px-3 py-1 rounded-full bg-emerald-500/20 border border-emerald-500/30 mb-6">
                        <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">New Dimension Awaits</span>
                    </div>
                    <h2 class="text-4xl font-black text-white uppercase italic mb-4 leading-none ltr:tracking-tighter rtl:tracking-normal">
                        Create Your <br><span class="gradient-text">Neural Profile.</span>
                    </h2>
                    <p class="text-slate-400 text-sm font-medium tracking-wide">Join the elite ranks of explorers and claim your unique player tag today.</p>
                </div>
            </div>

            <div class="p-8 md:p-16 relative">
                <div class="text-center mb-10">
                    <h3 class="text-3xl font-black text-slate-900 dark:text-white uppercase italic mb-2">Initialize</h3>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Start Your Mission Sequence</p>
                </div>

                <form onsubmit="handleRegister(event)" class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ltr:text-left rtl:text-right block">Unique Player Tag</label>
                        <div class="relative">
                            <i class="fas fa-at absolute ltr:left-4 rtl:right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                            <input type="text" required class="w-full p-4 ltr:pl-10 rtl:pr-10 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:border-emerald-500 dark:text-white transition-all" placeholder="Gamer_One">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ltr:text-left rtl:text-right block">Neural ID (Email)</label>
                        <input type="email" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:border-emerald-500 dark:text-white transition-all" placeholder="name@domain.com">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ltr:text-left rtl:text-right block">Security Key</label>
                        <div class="relative group">
                            <input id="reg-pass" type="password" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:border-emerald-500 dark:text-white transition-all ltr:pr-12 rtl:pl-12" placeholder="••••••••">
                            <button type="button" onclick="togglePass('reg-pass', 'eye-icon')" class="absolute ltr:right-4 rtl:left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-500 transition-colors">
                                <i id="eye-icon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="py-2">
                        <label class="flex items-start ltr:space-x-3 rtl:space-x-reverse rtl:space-x-3 cursor-pointer group">
                            <div class="relative mt-1">
                                <input type="checkbox" required class="peer hidden">
                                <div class="w-4 h-4 border-2 border-slate-300 dark:border-white/10 rounded peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all"></div>
                                <i class="fas fa-check absolute top-0.5 left-0.5 text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                            </div>
                            <span class="text-[10px] font-bold text-slate-500 uppercase leading-relaxed group-hover:text-slate-700 dark:group-hover:text-slate-300 transition-colors ltr:text-left rtl:text-right">
                                I accept the <a href="#" class="text-emerald-500 hover:underline">Code of Conduct</a> and privacy protocols.
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl shadow-emerald-500/20 transition-all active:scale-95">
                        Initiate Registration
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 dark:border-white/5">
                    <a href="login.html" class="block text-center group">
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">
                            Already Authorized? <span class="text-emerald-500 group-hover:underline">Sign In</span>
                        </p>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        function toggleDirection() {
            const html = document.documentElement;
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            localStorage.setItem('direction', newDir);
        }

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            alert('Initializing profile... Welcome to Avasa VR!');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
