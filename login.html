<!DOCTYPE html>
<html lang="en" class="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%2310b981' d='M352 256c0 22.2-1.2 43.6-3.3 64H163.3c-2.2-20.4-3.3-41.8-3.3-64s1.2-43.6 3.3-64h185.4c2.2 20.4 3.3 41.8 3.3 64zm28.8-64h74.7c.9 21 1.5 42.4 1.5 64s-.7 43-1.5 64h-74.7c2.3-20.5 3.5-41.9 3.5-64s-1.2-43.5-3.5-64zm-33.8-8.7c-12.4-52.1-32.2-94.2-56-119.3 35.8 11.1 67.2 32.3 89.7 60.1-13 19.5-24.6 39.5-33.7 59.2zM256 32c25.4 0 49.3 37.1 63.5 96H192.5c14.2-58.9 38.1-96 63.5-96zM163.7 52.8c22.5-27.8 53.9-49 89.7-60.1-23.8 25.1-43.6 67.2-56 119.3-9.1-19.7-20.7-39.7-33.7-59.2zm-77.4 139.2h74.7c-2.3 20.5-3.5 41.9-3.5 64s1.2 43.5 3.5 64H86.3c-.9-21-1.5-42.4-1.5-64s.7-43 1.5-64zm33.8 136.7c12.4 52.1 32.2 94.2 56 119.3-35.8-11.1-67.2-32.3-89.7-60.1 13-19.5 24.6-39.5 33.7-59.2zm138.5 131.3c-25.4 0-49.3-37.1-63.5-96h127.1c-14.2 58.9-38.1 96-63.6 96zm112.4-12c-22.5 27.8-53.9 49-89.7 60.1 23.8-25.1 43.6-67.2 56-119.3 9.1 19.7 20.7 39.7 33.7 59.2z'/></svg>">
    <title>Avasa VR | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .gradient-text { @apply bg-clip-text text-transparent bg-gradient-to-r from-emerald-500 to-cyan-500; }
        .glass { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl; }
        input:focus { @apply ring-2 ring-emerald-500/20; }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }

        if (localStorage.getItem('direction') === 'rtl') {
            document.documentElement.setAttribute('dir', 'rtl');
        } else {
            document.documentElement.setAttribute('dir', 'ltr');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex-shrink-0">
                <div class="flex items-center space-x-3 group cursor-pointer">
                    <div class="relative">
                        <div class="absolute -inset-1 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full blur opacity-40 group-hover:opacity-100 transition duration-500"></div>
                        <div class="relative bg-slate-900 rounded-lg p-2 flex items-center justify-center border border-white/10">
                            <i class="fas fa-vr-cardboard text-2xl text-emerald-500 group-hover:text-cyan-400 transition-colors"></i>
                        </div>
                    </div>
                    <div class="text-2xl font-black tracking-tighter italic uppercase flex items-center">
    <span class="text-emerald-500">AVASA</span>
    <span class="ml-2 text-slate-900 dark:text-white transition-colors">VR</span>
</div>
                </div>
            </a>

            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="p-3 rounded-xl bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-white/10">
                    <i class="fas fa-moon dark:hidden text-slate-600"></i>
                    <i class="fas fa-sun hidden dark:block text-emerald-400"></i>
                </button>
                <button onclick="toggleDirection()" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-white/10 text-[10px] font-black uppercase tracking-widest dark:text-white">
                    LTR/RTL
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 pt-24">
        <div class="w-full max-w-[1024px] grid grid-cols-1 lg:grid-cols-2 bg-white dark:bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl border border-slate-200 dark:border-white/5">
            
            <div class="hidden lg:block relative bg-slate-950">
                <img src="https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-50">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
                <div class="absolute bottom-12 left-12 right-12">
                    <h2 class="text-4xl font-black text-white uppercase italic mb-4 leading-none">Enter The <br><span class="text-emerald-500">Multiverse.</span></h2>
                    <p class="text-slate-400 text-sm font-medium tracking-wide">Connect your neural link and dominate the leaderboards.</p>
                </div>
            </div>

         <div class="p-8 md:p-16 relative">
    <div id="login-form" class="space-y-6 animate-in fade-in slide-in-from-right-4 duration-500">
        <div class="text-center">
            <h3 class="text-3xl font-black text-slate-900 dark:text-white uppercase italic mb-2">
                Welcome Back
            </h3>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Authorized Personnel Only</p>
        </div>

        <div class="flex gap-3">
            <button class="flex-1 py-3 border border-slate-200 dark:border-white/10 rounded-xl hover:bg-slate-50 dark:hover:bg-emerald-500/10 transition-all group">
                <i class="fab fa-google text-red-500 group-hover:scale-110 transition-transform"></i>
            </button>
            <button class="flex-1 py-3 border border-slate-200 dark:border-white/10 rounded-xl hover:bg-slate-50 dark:hover:bg-indigo-500/10 transition-all group">
                <i class="fab fa-discord text-indigo-500 group-hover:scale-110 transition-transform"></i>
            </button>
            <button class="flex-1 py-3 border border-slate-200 dark:border-white/10 rounded-xl hover:bg-slate-50 dark:hover:bg-white/5 transition-all group">
                <i class="fab fa-apple text-slate-900 dark:text-white group-hover:scale-110 transition-transform"></i>
            </button>
        </div>

        <div class="relative flex items-center py-2">
            <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
            <span class="flex-shrink mx-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Neural Link</span>
            <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-slate-500">Neural ID (Email)</label>
                <input type="email" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:border-emerald-500 dark:text-white transition-all" placeholder="name@domain.com">
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black uppercase tracking-widest text-slate-500">Security Key</label>
                <div class="relative group">
                    <input id="login-pass" type="password" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-white/10 rounded-2xl focus:outline-none focus:border-emerald-500 dark:text-white transition-all pr-12" placeholder="••••••••">
                    <button type="button" onclick="togglePassVisibility('login-pass', 'eye-icon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-500 transition-colors">
                        <i id="eye-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center space-x-2 cursor-pointer group">
                    <div class="relative">
                        <input type="checkbox" class="peer hidden">
                        <div class="w-4 h-4 border-2 border-slate-300 dark:border-white/10 rounded peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all"></div>
                        <i class="fas fa-check absolute top-0.5 left-0.5 text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                    </div>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest group-hover:text-slate-700 dark:group-hover:text-slate-300 transition-colors">Remember Link</span>
                </label>
                
                <button type="button" onclick="showForgot()" class="text-[10px] font-black text-emerald-500 uppercase hover:underline tracking-widest">Forgot Key?</button>
            </div>

            <button type="submit" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl shadow-emerald-500/20 transition-all active:scale-95 mt-2">
                Authorize Entry
            </button>
        </form>
       <a href="regesiter.html" class="block group">
    <p class="text-center text-xs font-bold text-slate-500 uppercase tracking-widest transition-colors group-hover:text-slate-600 dark:group-hover:text-slate-400">
        New explorer? 
        <span class="text-emerald-500 group-hover:underline">Create Account</span>
    </p>
</a>
       
    </div>
</div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        function toggleDirection() {
            const html = document.documentElement;
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', newDir);
            localStorage.setItem('direction', newDir);
        }

        function toggleForms(type) {
            const forms = ['login-form', 'signup-form', 'forgot-form'];
            forms.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(`${type}-form`).classList.remove('hidden');
        }

        function showForgot() { toggleForms('forgot'); }

        function handleLogin(e) { e.preventDefault(); window.location.href = "index.html"; }
        function handleSignup(e) { e.preventDefault(); window.location.href = "index.html"; }
        function handleReset(e) { e.preventDefault(); alert('Reset link sent to your neural ID.'); toggleForms('login'); }
    </script>
</body>
</html>
